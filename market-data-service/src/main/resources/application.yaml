server:
  port: 8088


spring:

  application:
    name: market-data-service


  datasource:
    url: jdbc:postgresql://localhost:5432/market_data_db
    username: bank_user
    password: bank_pass
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true



eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka

  instance:

    prefer-ip-address: true
