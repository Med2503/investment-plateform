server:
  port: 8089


spring:
  application:
    name: trading-service

  datasource:
    url: jdbc:postgres://localhost:5432/trading_db
    username: bank_user
    password: bank_pass
    driver-class-name: org.postgres.Driver

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-server: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

resilence4j:
  retry:
    instances:
      account-service:
        maxAttempts: 3
        waitDuration: 500 ms
      market-data-service:
        maxAttempts: 3
        waitDuration: 500 ms


  circuitbreaker:
    instances:
      account-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpeState: 10s
      market-data-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s



