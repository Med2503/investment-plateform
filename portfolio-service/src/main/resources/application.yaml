server:
  port: 8087



spring:
  application:
    name: portfolio-service


  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: bank_user
    password: bank_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
