version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bank-postgres
    restart: always

    environment:
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_pass
      POSTGRES_DB: auth_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test : ["CMD-SHELL","pg_isready -U bank_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: