server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

          filters:
          - name: RequestRateLimiter
            args:
              key-resolver: "#{@keyResolver}"
              redis-rate-limiter.replenishRate: 5
              redis-rate-limiter.burstCapacity: 10

        - id: customer-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/customers/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@keyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

      discovery:
        locator:
          enabled: false

logging:
  level:
    org.springframework.cloud.gateway.server.webflux: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUU3ByaW5nQm9vdDM=
  expiration: 86400000

