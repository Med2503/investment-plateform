server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path: /auth/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path: /customer/**
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path: /account/**



eureka:
  client:
    service-url:
      defaultZone :
        http://localhost:8761/eureka/



